name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: macos-13
            rid: osx-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # shell: bash works on all runners (Git Bash on Windows, bash on Linux/macOS)
      - name: Publish
        shell: bash
        run: |
          dotnet publish IEC104Simulator/IEC104Simulator.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o ./publish

      # Add run.sh + ensure executable bit (Linux / macOS only)
      - name: Add run script (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          printf '#!/usr/bin/env bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\n"$DIR/IEC104Simulator" "$@"\n' > ./publish/run.sh
          chmod +x ./publish/run.sh
          chmod +x ./publish/IEC104Simulator

      # Add run.bat (Windows only)
      - name: Add run script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          '@echo off'                        | Out-File -FilePath ./publish/run.bat -Encoding ASCII
          '"%~dp0\IEC104Simulator.exe" %*'  | Out-File -FilePath ./publish/run.bat -Encoding ASCII -Append

      # Package Windows -> zip
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/* `
            -DestinationPath "IEC104Simulator-${{ github.ref_name }}-${{ matrix.rid }}.zip"

      # Package Linux / macOS -> tar.gz (preserves executable permission)
      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf "IEC104Simulator-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" \
            -C ./publish .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: IEC104Simulator-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.ext }}
          generate_release_notes: true
