name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: macos-13
            rid: osx-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish IEC104Simulator/IEC104Simulator.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o ./publish

      - name: Prepare runtime wrapper and package
        run: |
          # create runnable start scripts for *nix
          printf '#!/usr/bin/env bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\n"$DIR/IEC104Simulator" "$@"\n' > ./publish/run.sh
          chmod +x ./publish/run.sh
          # create windows launcher
          printf '@echo off\n"%%~dp0\\IEC104Simulator.exe" %%*\n' > ./publish\run.bat

      - name: Package (Windows and create NSIS installer)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          # ensure NSIS is available
          choco install nsis -y
          # zip the publish folder
          Compress-Archive -Path ./publish/* -DestinationPath IEC104Simulator-${{ github.ref_name }}-${{ matrix.rid }}.zip
          # create NSIS script
          $nsi = @'
          !define PRODUCT_NAME "IEC104Simulator"
          !define PRODUCT_VERSION "${{ github.ref_name }}"
          OutFile "IEC104Simulator-${{ github.ref_name }}-setup-${{ matrix.rid }}.exe"
          InstallDir "$PROGRAMFILES\\${PRODUCT_NAME}"
          Page directory
          Page instfiles
          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "publish\\*"
            CreateShortCut "$DESKTOP\\${PRODUCT_NAME}.lnk" "$INSTDIR\\IEC104Simulator.exe"
          SectionEnd
'@
          $nsi | Out-File -FilePath installer.nsi -Encoding ASCII
          # run makensis
          makensis installer.nsi

      - name: Package (Linux / macOS tarball)
        if: matrix.rid != 'win-x64'
        run: |
          # ensure executable bit preserved in tar
          tar -czf IEC104Simulator-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz -C ./publish .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            IEC104Simulator-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.ext }}
            IEC104Simulator-${{ github.ref_name }}-setup-${{ matrix.rid }}.exe
          generate_release_notes: true
